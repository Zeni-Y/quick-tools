<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quick Tools</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Quick Tools</h1>
  <nav class="tabs">
    <button class="tab-btn active" data-tab="mosaic">画像モザイク</button>
    <button class="tab-btn" data-tab="pdf">PDFツール</button>
  </nav>
</header>

<main>
  <!-- ====== Image Mosaic Tab ====== -->
  <section id="tab-mosaic" class="tab-content active">
    <div class="panel-layout">
      <!-- Sidebar: controls -->
      <aside class="panel-sidebar">
        <div class="sidebar-section">
          <h3>画像を読み込む</h3>
          <div class="drop-zone" id="img-drop" style="padding:20px 12px; max-width:none;">
            <input type="file" accept="image/*" id="img-input">
            <p class="label">ドロップ or クリック</p>
            <p>PNG, JPG, WebP</p>
          </div>
        </div>

        <div class="sidebar-section">
          <h3>モザイク設定</h3>
          <div class="sidebar-group">
            <label>
              モード
              <select id="mosaic-mode">
                <option value="block">矩形モザイク</option>
                <option value="blur">ブラー</option>
              </select>
            </label>
            <label id="block-size-label">
              ブロックサイズ
              <span><input type="range" id="block-size" min="5" max="50" value="15"> <span id="block-val">15px</span></span>
            </label>
            <label id="blur-radius-label" style="display:none">
              ぼかし強度
              <span><input type="range" id="blur-radius" min="2" max="30" value="10"> <span id="blur-val">10</span></span>
            </label>
          </div>
        </div>

        <div class="sidebar-section">
          <h3>操作</h3>
          <div class="sidebar-btn-group">
            <button class="btn" id="apply-mosaic" disabled>適用</button>
            <button class="btn btn-outline" id="undo-mosaic" disabled>元に戻す</button>
            <button class="btn btn-danger btn-outline" id="img-reset">リセット</button>
          </div>
        </div>

        <div class="sidebar-section">
          <h3>保存</h3>
          <div class="sidebar-btn-group">
            <button class="btn btn-outline" id="dl-png">PNG保存</button>
            <button class="btn btn-outline" id="dl-jpg">JPG保存</button>
          </div>
        </div>
      </aside>

      <!-- Main: canvas preview -->
      <div class="panel-main">
        <div class="canvas-wrap" id="img-canvas-wrap">
          <canvas id="main-canvas"></canvas>
          <canvas id="overlay-canvas"></canvas>
        </div>
        <p style="color:var(--text2); font-size:0.85rem; margin-top:8px;" id="img-hint">
          画像を読み込むと、ここにプレビューが表示されます。ドラッグで範囲を選択してモザイクを適用できます。
        </p>
      </div>
    </div>
  </section>

  <!-- ====== PDF Tab ====== -->
  <section id="tab-pdf" class="tab-content">
    <div class="panel-layout">
      <!-- Sidebar: controls -->
      <aside class="panel-sidebar">
        <div class="sidebar-section">
          <h3>PDFを読み込む</h3>
          <div class="drop-zone" id="pdf-drop" style="padding:20px 12px; max-width:none;">
            <input type="file" accept="application/pdf" id="pdf-input">
            <p class="label">ドロップ or クリック</p>
            <p>PDF ファイル</p>
          </div>
        </div>

        <div id="pdf-sidebar-tools" style="display:none">
          <div class="sidebar-section">
            <h3>ページ選択</h3>
            <div class="sidebar-btn-group">
              <div class="btn-row">
                <button class="btn btn-outline btn-sm" id="select-all">全選択</button>
                <button class="btn btn-outline btn-sm" id="deselect-all">選択解除</button>
              </div>
              <div class="select-info" id="select-info">0ページ選択中</div>
            </div>
          </div>

          <div class="sidebar-section">
            <h3>編集</h3>
            <div class="sidebar-btn-group">
              <button class="btn btn-sm" id="rotate-90">90° 回転</button>
              <button class="btn btn-sm" id="rotate-180">180° 回転</button>
              <button class="btn btn-sm" id="rotate-270">270° 回転</button>
              <button class="btn btn-danger btn-sm" id="delete-pages">選択ページを削除</button>
            </div>
          </div>

          <div class="sidebar-section">
            <h3>書き出し</h3>
            <div class="sidebar-btn-group">
              <button class="btn" id="export-pdf">PDF書き出し</button>
              <button class="btn btn-outline" id="export-jpg">JPG書き出し</button>
            </div>
          </div>

          <div class="sidebar-section">
            <div class="sidebar-btn-group">
              <button class="btn btn-danger btn-outline btn-sm" id="pdf-reset">リセット</button>
            </div>
          </div>
        </div>
      </aside>

      <!-- Main: thumbnails + preview -->
      <div class="panel-main pdf-main">
        <div class="pdf-thumbs-area">
          <div class="thumbnails" id="thumbnails"></div>
          <p style="color:var(--text2); font-size:0.85rem; margin-top:8px;" id="pdf-hint">
            PDFを読み込むと、ここにページ一覧が表示されます。
          </p>
        </div>
        <div class="pdf-preview-panel" id="pdf-preview-panel">
          <div class="pdf-preview-inner">
            <canvas id="pdf-preview-canvas"></canvas>
            <p class="pdf-preview-label" id="pdf-preview-label"></p>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>

<div class="loading" id="loading"><div class="spinner"></div></div>
<div class="toast" id="toast"></div>

<script type="module" src="js/app.js"></script>
</body>
</html>
